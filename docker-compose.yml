services:
  nginx:
    image: nginx:alpine
    container_name: kurisu-nginx
    ports:
      - "15597:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  vixtts:
    build:
      context: ${VIXTTS_ROOT:-/home/khoa/application/viXTTS}/vixtts
      dockerfile: Dockerfile
    container_name: vixtts-container
    volumes:
      - ${VIXTTS_ROOT:-/home/khoa/application/viXTTS}/models:/models
      - ${VIXTTS_ROOT:-/home/khoa/application/viXTTS}/hf-cache:/root/.cache/huggingface
    ports:
      - "19770:19770"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:19770/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  gpt-sovits:
    image: legwork7623/gpt-sovits:latest 
    container_name: gpt-sovits-container
    environment:
      - is_half=True
      - is_share=False
    volumes:
      - ./data/sovits/output:/workspace/output
      - ./data/sovits/logs:/workspace/logs
      - ./data/sovits/weights:/workspace/SoVITS_weights
      - ./data/voice_storage:/workspace/data/voice_storage
      - tts-ref-audio:/shared-ref-audio
    working_dir: /workspace
    ports:
      - "9880:9880"
    shm_size: 16G
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
  universal-voice:
    build:
      context: ${UVOICE_ROOT:-/home/khoa/application/universal-asr}
      dockerfile: Dockerfile
    container_name: universal-voice
    volumes:
      - ${UVOICE_ROOT:-/home/khoa/application/universal-asr}/data:/app/data
      - uvoice-hf-cache:/root/.cache/huggingface
      - tts-ref-audio:/shared-ref-audio
    environment:
      - UVOICE_HOST=0.0.0.0
      - UVOICE_PORT=14213
      - UVOICE_DEVICE=auto
      - UVOICE_COMPUTE_TYPE=auto
      - UVOICE_DEFAULT_MODEL=base
      - UVOICE_DATA_DIR=/app/data
      - UVOICE_TTS_MODE=turbo
      - UVOICE_TTS_DEFAULT_MODEL=vixtts
      - UVOICE_GPTSOVITS_URL=http://gpt-sovits-container:9880
      - UVOICE_VIXTTS_URL=http://vixtts-container:19770
      - UVOICE_GPTSOVITS_REF_AUDIO_DIR=/shared-ref-audio
      - UVOICE_GPTSOVITS_REF_AUDIO_PREFIX=/shared-ref-audio
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "14213:14213"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kurisu-api
    depends_on:
      - postgres
      - vixtts
      - universal-voice
    expose:
      - "15597"
    networks:
      - default
      - ollama-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - ASR_API_URL=http://universal-voice:14213
      - LLM_API_URL=http://ollama-container:11434
      - UVOICE_URL=http://universal-voice:14213
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ./kurisuassistant:/app/kurisuassistant
      - ./scripts:/app/scripts
      - ./data:/app/data
    tty: true
    restart: unless-stopped


  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

networks:
  default:
  ollama-net:
    external: true
    name: ollama-openwebui_default

volumes:
  postgres-data:
  uvoice-hf-cache:
  tts-ref-audio:
